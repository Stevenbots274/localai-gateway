# fly.toml app configuration file generated for localai-gateway on 2026-06-26T20:46:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'localai-gateway'
primary_region = 'ams'

[build]

[env]
  ENVIRONMENT = 'production'
  LOCALAI_URL = 'http://localai.internal:8080'
  LOG_LEVEL = 'INFO'
  PORT = '8000'
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
  processes = ['app']

[[metrics]]
  port = 8000
  path = '/metrics'
