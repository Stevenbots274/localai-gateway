app = 'localai-gateway'
primary_region = 'iad'

[build]

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  LOCALAI_URL = "http://localai.internal:8080"
  LOG_LEVEL = "INFO"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  processes = ['app']

[metrics]
  port = 8000
  path = "/metrics"
